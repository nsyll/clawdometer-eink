; Clawdometer firmware — Waveshare ESP32-S3-ePaper-1.54 (B/W 200x200, SSD1681)
; SoC: ESP32-S3-PICO-1-N8R8 -> 8MB flash + 8MB OCTAL PSRAM
;
; Build:  pio run
; Flash:  pio run -t upload          (USB data cable; BLE app has no OTA path)

[env:clawdometer]
platform  = espressif32
board     = esp32-s3-devkitc-1
framework = arduino

monitor_speed = 115200
monitor_filters = esp32_exception_decoder
upload_speed = 115200

; N8R8 memory layout: QIO flash + OPI (octal) PSRAM
board_build.arduino.memory_type = qio_opi
board_build.flash_size  = 8MB
board_upload.flash_size = 8MB

build_flags =
    -DBOARD_HAS_PSRAM
    -DARDUINO_USB_CDC_ON_BOOT=1   ; Serial over the native USB-C port

lib_deps =
    zinggjm/GxEPD2@^1.6.0                    ; e-paper driver (SSD1681 = GxEPD2_154_D67)
    adafruit/Adafruit GFX Library@^1.11.11
    adafruit/Adafruit SHTC3 Library@^1.0.2   ; onboard temp/humidity sensor (I2C bring-up)
    bblanchon/ArduinoJson@^7.2.0             ; BLE usage payload
    h2zero/NimBLE-Arduino@^1.4.3             ; BLE GATT (1.4.x matches Arduino-ESP32 2.0.x)
